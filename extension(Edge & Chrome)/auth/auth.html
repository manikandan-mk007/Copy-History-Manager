<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cloud Sync Login</title>
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="auth-shell">
    <div class="auth-card">
      <div class="card-glow"></div>

      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 15a4 4 0 004 4h9a5 5 0 10-4.9-6H7a4 4 0 00-4 4z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="eyebrow">Cloud Sync Access</p>
      </div>

      <h1 id="authTitle">Welcome Back</h1>
      <p class="subtext">Sign in or create an account to store your copy history in the cloud.</p>

      <div class="tab-row">
        <button id="loginTab" class="tab active">Login</button>
        <button id="signupTab" class="tab">Signup</button>
      </div>

      <form id="authForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" id="submitBtn">
          <span>Login</span>
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </button>
      </form>

      <p id="message" class="message"></p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
